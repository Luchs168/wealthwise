<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WealthWise · Tests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-900:#111f3a; --navy-800:#1a2b4a; --navy-700:#2a3e63;
    --navy-500:#4c628a; --navy-100:#e4e9f2; --navy-50:#f1f4fa;
    --bg:#f8fafc; --surface:#fff;
    --ink-900:#0f172a; --ink-700:#334155; --ink-500:#64748b;
    --ink-400:#94a3b8; --ink-300:#cbd5e1; --ink-200:#e2e8f0; --ink-100:#f1f5f9;
    --green-600:#16a34a; --green-500:#22c55e; --green-50:#ecfdf5;
    --red-600:#dc2626; --red-500:#ef4444; --red-50:#fef2f2;
    --yellow-50:#fefce8; --yellow-600:#a16207;
    --font-display:"Inter Tight",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink-900);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  code{font-family:var(--font-mono);font-size:13px;background:var(--ink-100);padding:1px 6px;border-radius:4px;color:var(--navy-800)}

  .app{min-height:100vh;display:flex;flex-direction:column}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--ink-200);background:var(--surface);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:-.01em;color:var(--navy-900)}
  .brand-mark{width:26px;height:26px;border-radius:7px;background:var(--navy-800);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;font-family:var(--font-display)}
  .top-actions{display:flex;gap:18px;align-items:center;color:var(--ink-500);font-size:14px}
  .top-actions a{color:var(--ink-700);text-decoration:none}
  .top-actions a:hover{color:var(--navy-800)}
  .btn-mini{font:inherit;font-family:var(--font-mono);font-size:12px;padding:6px 12px;border:1px solid var(--ink-300);background:var(--surface);border-radius:6px;cursor:pointer;color:var(--ink-700)}
  .btn-mini:hover{border-color:var(--navy-700);color:var(--navy-800)}

  main{max-width:1080px;width:100%;margin:0 auto;padding:48px 40px 80px;flex:1}
  .page-head{margin-bottom:36px;max-width:720px}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--navy-700);margin-bottom:14px}
  h1.title{font-family:var(--font-display);font-weight:600;font-size:40px;letter-spacing:-.02em;line-height:1.1;margin:0 0 14px;text-wrap:balance}
  .subtitle{font-size:17px;color:var(--ink-500);margin:0;text-wrap:pretty}

  /* test card */
  .tc{background:var(--surface);border:1px solid var(--ink-200);border-radius:18px;padding:26px 28px;margin-bottom:18px;box-shadow:0 1px 2px rgba(17,31,58,.04)}
  .tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:22px;border-bottom:1px solid var(--ink-100);padding-bottom:18px}
  .tc-title{font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--ink-900);letter-spacing:-.01em;margin-bottom:4px}
  .tc-desc{font-size:14px;color:var(--ink-500)}

  .tc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .metric{background:var(--ink-100);border-radius:12px;padding:16px 18px}
  .m-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px}
  .m-val{font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.02em;color:var(--ink-900);line-height:1}
  .m-val .u{font-size:12px;color:var(--ink-500);font-weight:400;margin-left:6px}
  .m-sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:8px}
  .score-bar{height:5px;background:var(--ink-200);border-radius:3px;margin-top:10px;overflow:hidden}
  .score-bar i{display:block;height:100%;border-radius:3px;transition:width .3s}

  .tc-expect{font-family:var(--font-mono);font-size:12px;color:var(--ink-500);padding:10px 14px;background:var(--navy-50);border-radius:8px;border-left:2px solid var(--navy-500)}

  /* pro features */
  .tc-list{margin-bottom:18px;padding:14px 18px;background:var(--ink-100);border-radius:10px}
  .tc-list-h{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px}
  .tc-list ul{margin:0;padding-left:18px;font-size:13px;color:var(--ink-700)}
  .tc-list li{margin:4px 0}
  .tc-warn{margin-bottom:12px;padding:10px 14px;background:#fef2f2;color:#991b1b;border-radius:8px;border-left:3px solid #ef4444;font-size:13px;line-height:1.5}
  .tc-reco{margin-bottom:12px;padding:10px 14px;background:#ecfdf5;color:#14532d;border-radius:8px;border-left:3px solid #22c55e;font-size:13px;line-height:1.5}
  .tc-note{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:12px;line-height:1.4;font-style:italic}

  .tc-compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
  .tc-col{background:var(--ink-100);border-radius:12px;padding:18px 20px}
  .tc-col-savings{background:#ecfdf5;border:1px solid #a7f3d0}
  .tc-col-h{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--navy-900);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--ink-200)}
  .tc-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:13px;color:var(--ink-700)}
  .tc-row b{font-family:var(--font-mono);font-weight:500;color:var(--ink-900)}
  .tc-row-total{padding-top:10px;margin-top:6px;border-top:1px solid var(--ink-200);font-weight:600}

  .ahv-timing-table{margin-bottom:16px;border:1px solid var(--ink-200);border-radius:10px;overflow:hidden;font-size:13px}
  .att-head,.att-row{display:grid;grid-template-columns:1.8fr 1.2fr 0.9fr 1.1fr 1.1fr 1.1fr;gap:12px;padding:10px 16px;align-items:center}
  .att-head{background:var(--navy-50);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-500);font-weight:600;border-bottom:1px solid var(--ink-200)}
  .att-row{border-bottom:1px solid var(--ink-100)}
  .att-row:last-child{border-bottom:none}
  .att-row-normal{background:var(--ink-100)}
  .att-row div:nth-child(n+2){font-family:var(--font-mono)}

  .tc-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .kpi{background:var(--navy-50);padding:12px 14px;border-radius:8px}
  .kpi-l{font-family:var(--font-mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-500);margin-bottom:4px}
  .kpi-v{font-family:var(--font-display);font-weight:600;color:var(--navy-900);font-size:16px}

  /* rente vs kapital */
  .rk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .rk{background:var(--ink-100);border-radius:12px;padding:18px 20px;border:1px solid transparent}
  .rk.recommended{background:#ecfdf5;border-color:#a7f3d0}
  .rk-h{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--ink-700);margin-bottom:10px}
  .rk-amt{font-family:var(--font-display);font-weight:600;font-size:28px;letter-spacing:-.02em;color:var(--navy-900);line-height:1}
  .rk-amt span{font-size:12px;color:var(--ink-500);font-weight:400;margin-left:6px}
  .rk-tot{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:10px}
  .rk-tax{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:4px}
  .rk-warn{font-family:var(--font-mono);font-size:11px;color:var(--red-600);margin-top:8px;font-weight:600}

  .footer-info{margin-top:40px;padding:14px 18px;background:var(--ink-100);border-radius:8px;font-family:var(--font-mono);font-size:11px;color:var(--ink-500);text-align:center}

  .debug{background:#0f172a;color:#a7f3d0;padding:18px;border-radius:10px;font-size:11px;overflow:auto;max-height:600px;font-family:var(--font-mono)}

  @media (max-width:900px){
    .tc-grid,.rk-grid,.tc-compare,.tc-kpis{grid-template-columns:1fr}
    .att-head,.att-row{grid-template-columns:1fr;gap:4px}
    .topbar,main{padding-left:20px;padding-right:20px}
    h1.title{font-size:30px}
  }
</style>
<script defer src="analytics.js"></script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="wealthwise-calc.js"></script>
<script src="wealthwise-cashflow.js"></script>
<script src="wealthwise-pro-features.js"></script>
<script type="text/babel" data-presets="react" src="app-tests.jsx"></script>
</body>
</html>
