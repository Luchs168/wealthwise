<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WealthWise · Eure Analyse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ---------- Tokens ---------- */
  :root {
    /* Navy primary – exact brand */
    --navy-900: #111f3a;
    --navy-800: #1a2b4a;
    --navy-700: #2a3e63;
    --navy-500: #4c628a;
    --navy-100: #e4e9f2;
    --navy-50:  #f1f4fa;

    /* Neutrals */
    --bg:       #f8fafc;
    --surface:  #ffffff;
    --ink-900:  #0f172a;
    --ink-700:  #334155;
    --ink-500:  #64748b;
    --ink-400:  #94a3b8;
    --ink-300:  #cbd5e1;
    --ink-200:  #e2e8f0;
    --ink-100:  #f1f5f9;

    /* Accents */
    --green-600: #16a34a;
    --green-500: #22c55e;
    --green-50:  #ecfdf5;
    --red-600:   #dc2626;
    --red-500:   #ef4444;
    --red-50:    #fef2f2;

    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(17,31,58,0.06);
    --shadow-md: 0 4px 24px -8px rgba(17,31,58,0.14), 0 1px 2px rgba(17,31,58,0.05);

    --font-display: "Inter Tight", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink-900);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "cv11", "ss01";
  }

  /* ---------- App shell ---------- */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  /* Top brand bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--ink-200);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display);
    font-weight: 600; font-size: 18px; letter-spacing: -0.01em;
    color: var(--navy-900);
  }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--navy-800);
    display: grid; place-items: center;
    color: white; font-weight: 700;
    font-family: var(--font-display);
    font-size: 14px;
  }
  .top-actions { display: flex; gap: 18px; align-items: center; color: var(--ink-500); font-size: 14px; }
  .top-actions a { color: var(--ink-700); text-decoration: none; }
  .top-actions a:hover { color: var(--navy-800); }
  .top-save {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-500);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .top-save::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green-500);
  }

  /* Progress */
  .progress-wrap {
    padding: 28px 40px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
  }
  .steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    max-width: 980px;
    margin: 0 auto;
  }
  .step {
    display: flex; flex-direction: column; gap: 10px;
  }
  .step-bar {
    height: 4px; border-radius: 2px; background: var(--ink-200);
    overflow: hidden; position: relative;
  }
  .step-bar > i {
    display: block; height: 100%; width: 0%;
    background: var(--navy-800);
    transition: width .5s ease;
  }
  .step.active .step-bar > i { width: 30%; }
  .step.done .step-bar > i { width: 100%; }
  .step-meta {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 13px; color: var(--ink-500);
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }
  .step-meta b {
    font-family: var(--font-display);
    font-weight: 600;
    color: var(--ink-400);
    font-size: 14px;
    letter-spacing: -0.005em;
  }
  .step.active .step-meta b { color: var(--navy-900); }
  .step.active .step-meta { color: var(--navy-800); }

  /* Main */
  main {
    max-width: 980px; width: 100%; margin: 0 auto;
    padding: 48px 40px 160px;
    flex: 1;
  }

  .page-head { margin-bottom: 44px; max-width: 640px; }
  .eyebrow {
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--navy-700); margin-bottom: 14px;
  }
  h1.title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 40px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0 0 14px;
    color: var(--ink-900);
    text-wrap: balance;
  }
  .subtitle {
    font-size: 18px; color: var(--ink-500);
    margin: 0;
    text-wrap: pretty;
  }

  /* Block */
  .block { margin-bottom: 56px; }
  .block-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
  }
  .block-title {
    font-family: var(--font-display);
    font-weight: 600; font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--ink-900); margin: 0;
  }
  .block-hint {
    font-size: 14px; color: var(--ink-500);
  }
  .block-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-400);
    letter-spacing: 0.06em;
    margin-right: 10px;
  }

  /* Goal grid */
  .goal-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .goal {
    position: relative;
    border: 1px solid var(--ink-200);
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 18px 16px 16px;
    cursor: pointer;
    text-align: left;
    font: inherit; color: inherit;
    transition: border-color .15s, box-shadow .15s, transform .15s, background .15s;
    min-height: 128px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .goal:hover:not(.disabled) { border-color: var(--navy-500); }
  .goal.active {
    border-color: var(--navy-800);
    background: var(--navy-50);
    box-shadow: 0 0 0 3px rgba(26,43,74,0.12);
  }
  .goal.disabled {
    cursor: not-allowed;
    opacity: 0.75;
    background: var(--ink-100);
  }
  .goal.disabled .goal-label { color: var(--ink-500); }
  .goal-top { display: flex; align-items: center; justify-content: space-between; }
  .goal-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--ink-100);
    display: grid; place-items: center;
    color: var(--ink-500);
  }
  .goal.active .goal-icon {
    background: var(--navy-800); color: white;
  }
  .goal-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--ink-300);
    display: grid; place-items: center;
    background: var(--surface);
    transition: all .15s;
  }
  .goal.active .goal-check {
    background: var(--navy-800);
    border-color: var(--navy-800);
    color: white;
  }
  .goal-check svg { width: 12px; height: 12px; display: none; }
  .goal.active .goal-check svg { display: block; }
  .goal-label {
    font-family: var(--font-display);
    font-weight: 600; font-size: 15.5px;
    letter-spacing: -0.005em;
    line-height: 1.25;
    color: var(--ink-900);
    text-wrap: balance;
  }
  .goal-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 10.5px;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-500);
    background: var(--surface);
    border: 1px solid var(--ink-200);
    padding: 3px 7px; border-radius: 999px;
    margin-top: 10px; width: fit-content;
  }
  .goal.disabled .goal-pill { background: white; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--ink-200);
    margin-bottom: 28px;
  }
  .tab {
    font: inherit; background: none; border: none; cursor: pointer;
    padding: 12px 18px;
    font-family: var(--font-display);
    font-weight: 500; font-size: 15px;
    color: var(--ink-500);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--ink-900); }
  .tab.active {
    color: var(--navy-900);
    border-bottom-color: var(--navy-800);
  }
  .tab .tab-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--ink-200); color: var(--ink-500);
    display: grid; place-items: center;
    font-size: 11px; font-family: var(--font-mono);
    font-weight: 600;
  }
  .tab.active .tab-dot { background: var(--navy-800); color: white; }
  .tab.add-tab { color: var(--navy-700); }
  .tab.add-tab:hover { color: var(--navy-900); }

  /* Form grid */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px 28px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.span-2 { grid-column: span 2; }
  .field label {
    font-family: var(--font-display);
    font-weight: 500; font-size: 14px;
    color: var(--ink-700);
    letter-spacing: -0.005em;
  }
  .input, .date-input {
    font: inherit; font-family: var(--font-body);
    font-size: 17px;
    padding: 14px 16px;
    border: 1px solid var(--ink-300);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--ink-900);
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  .input:hover, .date-input:hover { border-color: var(--ink-400); }
  .input:focus, .date-input:focus, .select:focus {
    outline: none;
    border-color: var(--navy-800);
    box-shadow: 0 0 0 3px rgba(26,43,74,0.15);
  }

  /* Select */
  .select {
    font: inherit; font-family: var(--font-body);
    font-size: 17px;
    padding: 14px 44px 14px 16px;
    border: 1px solid var(--ink-300);
    border-radius: var(--radius-sm);
    background: var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>") no-repeat right 14px center;
    color: var(--ink-900);
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .15s, box-shadow .15s;
    cursor: pointer;
  }
  .select:hover { border-color: var(--ink-400); }

  /* Segmented toggle */
  .segmented {
    display: inline-flex; padding: 4px;
    background: var(--ink-100);
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    width: fit-content;
  }
  .segmented button {
    font: inherit; background: none; border: none; cursor: pointer;
    padding: 9px 18px;
    font-family: var(--font-display);
    font-weight: 500; font-size: 14.5px;
    color: var(--ink-500);
    border-radius: 7px;
    min-width: 110px;
    transition: all .15s;
  }
  .segmented button.active {
    background: var(--surface);
    color: var(--ink-900);
    box-shadow: var(--shadow-sm);
  }

  /* Age readout */
  .age-readout {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-500);
    padding: 10px 14px;
    background: var(--ink-100);
    border-radius: var(--radius-sm);
    width: fit-content;
    letter-spacing: 0.01em;
  }
  .age-readout b { color: var(--navy-800); font-weight: 600; }

  /* Person card container */
  .person-card {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: var(--radius-lg);
    padding: 28px 30px;
  }

  /* Slider block */
  .slider-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .slider-card {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: var(--radius-lg);
    padding: 26px 28px;
  }
  .slider-card h4 {
    font-family: var(--font-display);
    font-weight: 500; font-size: 14px;
    color: var(--ink-700);
    margin: 0 0 4px;
  }
  .slider-card .who {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-400); margin-bottom: 18px;
  }
  .retire-value {
    display: flex; align-items: baseline; gap: 12px;
    margin: 6px 0 18px;
  }
  .retire-value .num {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 56px; letter-spacing: -0.03em;
    line-height: 1; color: var(--navy-900);
  }
  .retire-value .unit {
    font-family: var(--font-display);
    font-size: 16px; color: var(--ink-500);
  }
  .retire-remain {
    font-size: 14px; color: var(--ink-500);
    margin-bottom: 22px;
  }
  .retire-remain b { color: var(--ink-900); font-weight: 600; }

  /* Range slider */
  .range-wrap { position: relative; padding-top: 6px; }
  input[type=range].range {
    -webkit-appearance: none; appearance: none;
    width: 100%; background: transparent; height: 28px;
    margin: 0;
  }
  input[type=range].range::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px;
    background: linear-gradient(to right, var(--navy-800) var(--val, 0%), var(--ink-200) var(--val, 0%));
  }
  input[type=range].range::-moz-range-track {
    height: 6px; border-radius: 3px;
    background: var(--ink-200);
  }
  input[type=range].range::-moz-range-progress {
    height: 6px; border-radius: 3px;
    background: var(--navy-800);
  }
  input[type=range].range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--navy-800);
    margin-top: -8px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(26,43,74,0.25);
    transition: transform .1s;
  }
  input[type=range].range::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--navy-800);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(26,43,74,0.25);
  }
  input[type=range].range:active::-webkit-slider-thumb { transform: scale(1.08); }
  input[type=range].range:focus { outline: none; }
  input[type=range].range:focus::-webkit-slider-thumb {
    box-shadow: 0 0 0 4px rgba(26,43,74,0.18);
  }

  /* Radio option cards */
  .radio-list { display: flex; flex-direction: column; gap: 10px; }
  .radio-card {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .radio-card:hover { border-color: var(--navy-500); }
  .radio-card.active {
    border-color: var(--navy-800);
    background: var(--navy-50);
    box-shadow: 0 0 0 3px rgba(26,43,74,0.1);
  }
  .radio-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--ink-300);
    display: grid; place-items: center;
    background: var(--surface);
    flex-shrink: 0;
    transition: all .15s;
  }
  .radio-card.active .radio-dot { border-color: var(--navy-800); border-width: 6px; }
  .radio-body { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .radio-title {
    font-family: var(--font-display);
    font-weight: 600; font-size: 16px;
    color: var(--ink-900);
    display: flex; align-items: center; gap: 10px;
  }
  .radio-sub { font-size: 14px; color: var(--ink-500); }
  .radio-badge {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px;
    background: var(--green-50); color: var(--green-600);
    border: 1px solid #a7f3d0;
    font-weight: 600;
  }
  .amount-wrap {
    margin-top: 4px;
    display: grid; grid-template-columns: auto 1fr; align-items: center;
    gap: 0;
    max-width: 320px;
  }
  .amount-prefix {
    font-family: var(--font-mono); font-size: 15px;
    color: var(--ink-500);
    padding: 14px 14px 14px 16px;
    border: 1px solid var(--ink-300);
    border-right: none;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    background: var(--ink-100);
  }
  .amount-input {
    font: inherit; font-family: var(--font-body);
    font-size: 17px;
    padding: 14px 16px;
    border: 1px solid var(--ink-300);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    background: var(--surface);
    color: var(--ink-900);
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  .amount-input:focus { outline: none; border-color: var(--navy-800); box-shadow: 0 0 0 3px rgba(26,43,74,0.15); }
  .amount-suffix {
    padding: 14px 14px;
    font-family: var(--font-mono); font-size: 13px; color: var(--ink-500);
  }

  .range-marks {
    display: flex; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-400); margin-top: 10px;
    letter-spacing: 0.04em;
  }
  .range-marks span.mark-hit { color: var(--navy-800); font-weight: 600; }

  /* Footer nav */
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(248,250,252,0.88);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--ink-200);
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 9;
  }
  .footer-meta {
    font-size: 13px; color: var(--ink-500);
    font-family: var(--font-mono);
  }
  .btn {
    font: inherit; font-family: var(--font-display);
    font-weight: 500; font-size: 16px;
    padding: 14px 26px;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background .15s, transform .1s, box-shadow .15s;
  }
  .btn-primary {
    background: var(--navy-800); color: white;
    box-shadow: 0 1px 2px rgba(26,43,74,0.25), 0 6px 18px -8px rgba(26,43,74,0.5);
  }
  .btn-ghost[disabled] { opacity: 0.5; cursor: not-allowed; }
  .btn-primary:hover { background: var(--navy-900); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-ghost {
    background: transparent; color: var(--ink-500);
  }
  .btn-ghost:hover { color: var(--ink-900); }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 20px; bottom: 96px;
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: 14px;
    box-shadow: var(--shadow-md);
    padding: 18px 20px;
    display: none;
    z-index: 20;
  }
  .tweaks.open { display: block; }
  .tweaks h5 {
    margin: 0 0 12px;
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-500);
    display: flex; justify-content: space-between; align-items: center;
  }
  .tweaks .row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-top: 1px solid var(--ink-100);
  }
  .tweaks .row:first-of-type { border-top: none; }
  .tweaks label { font-size: 14px; color: var(--ink-700); }
  .tweaks select, .tweaks input[type=color] {
    font: inherit; font-size: 13px;
    border: 1px solid var(--ink-300);
    border-radius: 6px; padding: 4px 8px;
    background: var(--surface);
  }

  /* Screen 4 additions */
  .result-hero {
    border-radius: var(--radius-lg);
    padding: 36px 40px;
    margin-bottom: 36px;
    display: flex; align-items: center; gap: 26px;
    border: 1px solid;
  }
  .result-hero.green { background: #f0fdf4; border-color: #bbf7d0; }
  .result-hero.yellow { background: #fefce8; border-color: #fde68a; }
  .result-hero.red { background: #fef2f2; border-color: #fecaca; }
  .result-ico {
    width: 72px; height: 72px; border-radius: 20px;
    display: grid; place-items: center; flex-shrink: 0;
    color: white;
  }
  .green .result-ico { background: var(--green-500); }

  .yellow .result-lead { color: #a16207; }

  .result-title { font-family: var(--font-display); font-weight: 600; font-size: 32px; letter-spacing: -0.02em; line-height: 1.15; margin: 0 0 10px; color: var(--ink-900); text-wrap: balance; }
  .result-sub { font-size: 17px; color: var(--ink-700); margin: 0; }
  .result-sub b { font-family: var(--font-display); font-weight: 600; }

  .yellow .result-sub b { color: #a16207; }

  .state-switcher {

  }

    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-500);

  .bar-compare { margin-top: 8px; }
  .bar-row { display: grid; grid-template-columns: 120px 1fr 130px; align-items: center; gap: 18px; margin-bottom: 12px; }
  .bar-row .bar-lbl { font-family: var(--font-display); font-weight: 500; font-size: 15px; color: var(--ink-700); }

  .bar-track { height: 28px; border-radius: 8px; background: var(--ink-100); overflow: hidden; position: relative; }

  .bar-fill.income { background: linear-gradient(90deg, var(--navy-700), var(--navy-800)); }

  .diff-row {

  .diff-row.pos .diff-val { color: var(--green-600); }
  .diff-note { font-family: var(--font-mono); font-size: 12px; color: var(--ink-500); margin-top: 10px; }

  .pillar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .pillar-card {
    background: var(--surface); border: 1px solid var(--ink-200); border-radius: var(--radius-md);
    padding: 22px 22px; display: flex; flex-direction: column; gap: 14px;
    position: relative;
  }
  .pillar-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .pillar-ico { width: 40px; height: 40px; border-radius: 10px; background: var(--navy-50); color: var(--navy-800); display: grid; place-items: center; flex-shrink: 0; }
  .pillar-label { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--ink-900); line-height: 1.2; }
  .pillar-sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
  .pillar-amount { font-family: var(--font-display); font-weight: 600; font-size: 26px; color: var(--navy-800); letter-spacing: -0.01em; line-height: 1; }
  .pillar-amount .u { font-size: 13px; color: var(--ink-500); font-weight: 400; margin-left: 4px; }
  .pillar-breakdown { font-size: 13px; color: var(--ink-700); }
  .pillar-breakdown .br-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px dashed var(--ink-100); }
  .pillar-breakdown .br-row:last-child { border-bottom: none; }
  .pillar-breakdown .br-row b { color: var(--ink-900); font-family: var(--font-mono); font-weight: 500; }
  .pillar-footnote { font-size: 12px; color: var(--ink-500); line-height: 1.4; border-top: 1px solid var(--ink-100); padding-top: 10px; }

  .info-btn {
    background: none; border: none; cursor: pointer; color: var(--ink-400);
    width: 22px; height: 22px; border-radius: 50%;
    display: grid; place-items: center;
    transition: color .15s, background .15s;
  }
  .info-btn:hover { color: var(--navy-800); background: var(--navy-50); }

  /* Tooltip popover */
  .tip-pop {
    position: absolute; top: 46px; right: 16px; z-index: 3;
    width: 260px; background: var(--ink-900); color: white;
    padding: 12px 14px; border-radius: 10px;
    font-size: 13px; line-height: 1.5;
    box-shadow: var(--shadow-md);
  }
  .tip-pop::before {
    content: ""; position: absolute; top: -5px; right: 16px;
    width: 10px; height: 10px; background: var(--ink-900); transform: rotate(45deg);
  }

  /* Donut + legend */
  .donut-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 40px; align-items: center; }
  .donut-wrap svg { width: 100%; height: auto; max-width: 280px; }
  .donut-center { font-family: var(--font-display); }
  .legend { display: flex; flex-direction: column; gap: 2px; }
  .legend-row { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 12px; align-items: center; padding: 9px 4px; border-bottom: 1px dashed var(--ink-100); font-size: 14px; }
  .legend-row:last-child { border-bottom: none; }
  .legend-row.total { border-top: 1.5px solid var(--ink-300); border-bottom: none; margin-top: 6px; padding-top: 14px; font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--ink-900); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
  .legend-amt { font-family: var(--font-mono); color: var(--ink-900); }
  .legend-pct { font-family: var(--font-mono); font-size: 12px; color: var(--ink-500); min-width: 42px; text-align: right; }

  /* Timeline chart */
  .timeline-card {
    background: var(--surface); border: 1px solid var(--ink-200); border-radius: var(--radius-lg);
    padding: 26px 28px;
  }
  .timeline-legend { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px; font-size: 13px; color: var(--ink-500); }
  .timeline-legend .lg { display: flex; align-items: center; gap: 6px; }
  .lg-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Hebel cards */
  .hebel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .hebel-card {
    background: var(--surface); border: 1px solid var(--ink-200); border-radius: var(--radius-md);
    padding: 22px 24px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color .15s, box-shadow .15s, transform .15s;
  }
  .hebel-card:hover { border-color: var(--navy-500); transform: translateY(-1px); }
  .hebel-head { display: flex; align-items: center; gap: 12px; }
  .hebel-ico { width: 40px; height: 40px; border-radius: 10px; background: var(--navy-50); color: var(--navy-800); display: grid; place-items: center; flex-shrink: 0; }
  .hebel-title { font-family: var(--font-display); font-weight: 600; font-size: 17px; color: var(--ink-900); margin: 0; }
  .hebel-text { font-size: 14px; color: var(--ink-700); line-height: 1.55; margin: 0; }
  .hebel-effect {
    background: var(--green-50); color: #166534;
    padding: 8px 12px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 12.5px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    width: fit-content;
  }
  .hebel-effect.neutral { background: var(--navy-50); color: var(--navy-800); }
  .hebel-link {
    font-family: var(--font-display); font-weight: 600; font-size: 14px;
    color: var(--navy-800); text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px; margin-top: 4px;
  }
  .hebel-link:hover { color: var(--navy-900); }

  /* Disclaimer */
  .disclaimer {
    background: var(--ink-100); border: 1px solid var(--ink-200);
    border-radius: var(--radius-md); padding: 20px 24px;
    display: flex; gap: 16px; font-size: 14px; color: var(--ink-700); line-height: 1.55;
  }
  .disclaimer .dc-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--surface); color: var(--ink-500); display: grid; place-items: center; flex-shrink: 0; }
  .disclaimer b { color: var(--ink-900); font-family: var(--font-display); font-weight: 600; }
  .disclaimer .sources { font-family: var(--font-mono); font-size: 12px; color: var(--ink-500); margin-top: 10px; letter-spacing: 0.01em; }

  .actions-row { display: flex; gap: 12px; justify-content: center; margin-top: 36px; flex-wrap: wrap; }

  @media (max-width: 900px) {
    .pillar-grid { grid-template-columns: 1fr 1fr; }
    .donut-wrap { grid-template-columns: 1fr; }
    .hebel-grid { grid-template-columns: 1fr; }
    .result-hero { flex-direction: column; align-items: flex-start; padding: 24px; }
    .diff-row { grid-template-columns: 1fr 1fr; }
  }
  .variant-toggle {
    display: inline-flex; padding: 4px;
    background: var(--ink-100);
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    margin-bottom: 32px;
  }

  /* === NEW: Sustainability Score === */
  .score-card {
    background: var(--surface); border: 1px solid var(--ink-200);
    border-radius: var(--radius-lg); padding: 32px 40px;
    display: grid; grid-template-columns: 180px 1fr auto; align-items: center; gap: 36px;
    margin-bottom: 24px;
  }
  .score-ring { position: relative; width: 160px; height: 160px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .score-num {
    position: absolute; inset: 0; display: grid; place-items: center;
    flex-direction: column;
  }
  .score-ring .score-num .n {
    font-family: var(--font-display); font-weight: 600; font-size: 48px;
    letter-spacing: -0.03em; line-height: 1; color: var(--ink-900);
  }
  .score-ring .score-num .d {
    font-family: var(--font-mono); font-size: 12px; color: var(--ink-500);
    margin-top: 4px; letter-spacing: 0.06em;

    display: flex; flex-direction: column; align-items: center;
  }
  .score-meta .score-eyebrow {

  .score-meta .score-label {
    font-family: var(--font-display); font-weight: 600; font-size: 28px;

  }
  .score-meta .score-label.ausgezeichnet { color: #15803d; }
  .score-meta .score-label.gut { color: var(--green-600); }
  .score-meta .score-label.ausreichend { color: #a16207; }
  .score-meta .score-label.kritisch { color: #c2410c; }
  .score-meta .score-label.ungenuegend { color: var(--red-600); }
  .score-meta p { font-size: 15px; color: var(--ink-700); line-height: 1.55; margin: 0; max-width: 44ch; }
  .score-scale {
    display: flex; flex-direction: column; gap: 4px;
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-500);
    border-left: 1px solid var(--ink-200); padding-left: 18px;
  }

  .score-scale .ss-row b { color: var(--ink-700); font-weight: 500; font-family: var(--font-display); font-size: 12px; }
  .score-scale .ss-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

  /* === Pillar cards enhancement === */
  .pillar-card.xl { min-height: 240px; }
  .pillar-breakdown.detailed .br-row span { font-size: 12.5px; }
  .pillar-breakdown.detailed .br-row .sub { color: var(--ink-500); font-family: var(--font-mono); font-size: 11px; }

  /* === NEW: Rente vs. Kapital === */
  .bezug-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch; }
  .bezug-card {
    background: var(--surface); border: 1px solid var(--ink-200);
    border-radius: var(--radius-md);
    padding: 22px 22px; display: flex; flex-direction: column; gap: 14px;
    position: relative;
  }
  .bezug-card.recommended { border: 2px solid var(--navy-700); box-shadow: 0 0 0 4px rgba(26,43,74,0.08); }
  .bezug-card .rec-badge {
    position: absolute; top: -10px; left: 22px;
    background: var(--navy-800); color: white;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
    padding: 4px 10px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .bezug-card .bz-head {
    font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--ink-900);
    display: flex; align-items: center; gap: 8px;
  }
  .bezug-card .bz-amount {
    font-family: var(--font-display); font-weight: 600; font-size: 28px; color: var(--navy-800);
    letter-spacing: -0.02em; line-height: 1;
  }
  .bezug-card .bz-amount .u { font-size: 13px; color: var(--ink-500); font-weight: 400; margin-left: 4px; }
  .bezug-card .bz-meta { font-size: 13px; color: var(--ink-600); line-height: 1.5; }
  .bezug-card .bz-meta b { color: var(--ink-900); font-family: var(--font-display); font-weight: 500; }
  .bezug-card .bz-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--ink-100); padding-top: 12px; }
  .bezug-card .bz-list li { font-size: 13.5px; display: flex; align-items: center; gap: 8px; color: var(--ink-700); }
  .bezug-card .bz-list li .pro { color: var(--green-600); font-weight: 700; flex-shrink: 0; }
  .bezug-card .bz-list li .con { color: var(--red-600); font-weight: 700; flex-shrink: 0; }
  .bezug-info {
    margin-top: 16px; background: var(--navy-50); border: 1px solid #c7d2fe;
    border-radius: var(--radius-md); padding: 14px 18px;
    font-size: 14px; color: var(--ink-700); line-height: 1.55;
    display: flex; gap: 12px; align-items: flex-start;
  }

  /* === Compact Expense Bars === */
  .expense-compact { display: grid; grid-template-columns: 200px 1fr; gap: 32px; align-items: center; }
  .expense-compact svg { width: 100%; height: auto; max-width: 200px; }
  .ex-bars { display: flex; flex-direction: column; gap: 10px; }
  .ex-bar-row {
    display: grid; grid-template-columns: 120px 1fr 90px 44px; gap: 14px; align-items: center;

  .ex-bar-amt { font-family: var(--font-mono); color: var(--ink-900); text-align: right; font-size: 13px; }
  .ex-bar-pct { font-family: var(--font-mono); color: var(--ink-500); font-size: 12px; text-align: right; }
  .ex-total {
    margin-top: 6px; padding-top: 12px; border-top: 1.5px solid var(--ink-300);
    display: grid; grid-template-columns: 120px 1fr 90px 44px; gap: 14px;
    font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--ink-900);
    align-items: center;
  }
  .ex-total .ex-bar-amt { font-size: 15px; }

  /* === Scenario Overview Cards === */
  .scenario-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
  .scn-card {
    background: var(--surface); border: 1px solid var(--ink-200);
    border-radius: var(--radius-md); padding: 18px 20px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .scn-card.opt { border-left: 4px solid var(--green-500); }
  .scn-card.neu { border-left: 4px solid #eab308; }
  .scn-card.pes { border-left: 4px solid var(--red-500); }
  .scn-card .scn-head {
    font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--ink-900);
    display: flex; justify-content: space-between; align-items: center;

    font-family: var(--font-mono); font-size: 11px; color: var(--ink-500);

  .scn-card.opt .scn-emph { color: var(--green-600); }
  .scn-card.pes .scn-emph { color: var(--red-600); }
  .scn-card.neu .scn-emph { color: #a16207; }

  /* === AHV Timing Table === */
  .ahv-table {
    width: 100%; border-collapse: collapse;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: var(--radius-md);
    overflow: hidden;

  .ahv-table th {
    background: var(--ink-50); font-family: var(--font-mono); font-size: 11px;

    text-align: right; padding: 12px 16px; border-bottom: 1px solid var(--ink-200);

  .ahv-table th:first-child { text-align: left; }

    display: flex; align-items: center; gap: 8px;

  .tax-card .tx-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px dashed var(--ink-100);
    font-size: 14px;

  .tax-card .tx-row:last-of-type { border-bottom: none; }
  .tax-card .tx-row span { color: var(--ink-500); }
  .tax-card .tx-row b { color: var(--ink-900); font-family: var(--font-mono); font-weight: 500; }
  .tax-card .tx-row.emph b { font-size: 18px; color: var(--navy-800); font-family: var(--font-display); font-weight: 600; }

  .tax-savings {

  .tax-savings .ts-label { font-family: var(--font-mono); font-size: 11px; color: var(--green-600); letter-spacing: 0.06em; text-transform: uppercase; }
  .tax-savings .ts-val { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: #15803d; letter-spacing: -0.02em; }
  .tax-savings .ts-sub { font-family: var(--font-mono); font-size: 12px; color: var(--ink-500); }

  @media (max-width: 900px) {
    .score-card { grid-template-columns: 1fr; justify-items: center; text-align: center; }

  .variant-toggle button {
    font: inherit; background: none; border: none; cursor: pointer;
    padding: 10px 20px;
    font-family: var(--font-display);
    font-weight: 500; font-size: 14.5px;

  .summary-source {

  .option-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .option-card {

  .switch-label { font-family: var(--font-display); font-weight: 500; font-size: 15px; color: var(--ink-900); }

  /* AHV card */
  .ahv-card {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: var(--radius-lg);
    padding: 28px 30px;
    box-shadow: var(--shadow-sm);

    background: var(--navy-50);

  .ahv-details {

  /* Dropzone */
  .dropzone {
    border: 1.5px dashed var(--ink-300);

    padding: 34px 26px;
    text-align: center;
    background: var(--ink-100);
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover { border-color: var(--navy-500); background: var(--navy-50); }
  .dropzone .cloud {
    width: 56px; height: 56px; border-radius: 14px;

    display: inline-grid; place-items: center; margin-bottom: 12px;

  /* ===== Screen 4 specific ===== */

  /* Hero Result */
  .hero-result {
    position: relative;
    padding: 36px 40px 32px;
    border-radius: 18px;
    background: var(--surface);
    border: 1px solid var(--ink-200);
    overflow: hidden;
  }
  .hero-result.is-good { background: linear-gradient(135deg, #ecfdf5 0%, #f8fafc 100%); border-color: #a7f3d0; }
  .hero-result.is-warn { background: linear-gradient(135deg, #fefce8 0%, #f8fafc 100%); border-color: #fde047; }
  .hero-result.is-bad  { background: linear-gradient(135deg, #fef2f2 0%, #f8fafc 100%); border-color: #fecaca; }
  .hero-result::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    width: 6px;
  }
  .hero-result.is-good::before { background: var(--green-500); }
  .hero-result.is-warn::before { background: #eab308; }
  .hero-result.is-bad::before  { background: var(--red-500); }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;

  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;

    border: 1px solid rgba(0,0,0,0.05);

    padding: 18px 22px;
    margin-top: 18px;

  .hero-stat .hs-label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .hero-stat .hs-val { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--ink-900); letter-spacing: -0.01em; }
  .hero-stat .hs-sub { font-size: 12.5px; color: var(--ink-500); margin-top: 2px; }

  /* Reichweite-Balken */
  .reach-bar {
    margin: 22px 0 6px;
  }
  .reach-track {
    position: relative; height: 28px;
    background: var(--ink-100);
    border-radius: 8px;
    overflow: hidden;
  }
  .reach-fill {
    position: absolute; top: 0; left: 0; bottom: 0;

    transition: width .4s ease;

    position: absolute; top: -4px; bottom: -4px;

    content: attr(data-label);

    border: 1px solid var(--ink-200);
