<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111f3a"/>
      <stop offset="100%" style="stop-color:#1a2b4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle accent stripe -->
  <rect x="0" y="0" width="1200" height="4" fill="#3b82f6" opacity="0.8"/>

  <!-- Decorative circles (background depth) -->
  <circle cx="980" cy="120" r="260" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="980" cy="120" r="180" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="980" cy="120" r="100" fill="rgba(59,130,246,0.06)"/>

  <!-- Diagonal grid lines (subtle) -->
  <line x1="0" y1="630" x2="400" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="630" x2="600" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- WealthWise Logo badge (top left) -->
  <rect x="64" y="56" width="52" height="52" rx="14" fill="#3b82f6"/>
  <text x="90" y="90" text-anchor="middle" font-size="28" font-weight="700" fill="white" font-family="Arial, sans-serif">W</text>
  <text x="130" y="91" font-size="22" font-weight="600" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">WealthWise</text>

  <!-- Main headline -->
  <text x="64" y="220" font-size="82" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="-2">Reicht</text>
  <text x="64" y="320" font-size="82" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="-2">Ihre Rente?</text>

  <!-- Accent underline under headline -->
  <rect x="64" y="336" width="340" height="5" rx="2.5" fill="#3b82f6"/>

  <!-- Subline -->
  <text x="64" y="400" font-size="32" font-weight="400" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">Kostenlose Vorsorgeanalyse in 10 Minuten</text>

  <!-- Feature pills -->
  <rect x="64" y="448" width="168" height="44" rx="22" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="148" y="475" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif">AHV 2026</text>

  <rect x="248" y="448" width="158" height="44" rx="22" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="327" y="475" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif">Pensionskasse</text>

  <rect x="422" y="448" width="130" height="44" rx="22" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="487" y="475" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif">Säule 3a</text>

  <!-- Right side: Mock Score Ring -->
  <circle cx="960" cy="315" r="140" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="18"/>
  <circle cx="960" cy="315" r="140" fill="none" stroke="#22c55e" stroke-width="18"
          stroke-dasharray="659 880" stroke-linecap="round"
          transform="rotate(-90 960 315)"/>
  <text x="960" y="300" text-anchor="middle" font-size="72" font-weight="700" fill="#22c55e" font-family="Arial, sans-serif">78</text>
  <text x="960" y="340" text-anchor="middle" font-size="22" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif">/100 Punkte</text>
  <text x="960" y="380" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif">Vorsorge-Score</text>

  <!-- Swiss Cross (bottom right, subtle) -->
  <g transform="translate(1100, 560)" opacity="0.18">
    <rect x="-22" y="-22" width="44" height="44" fill="white"/>
    <rect x="-7" y="-22" width="14" height="44" fill="#111f3a"/>
    <rect x="-22" y="-7" width="44" height="14" fill="#111f3a"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.25)"/>
  <text x="64" y="616" font-size="16" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif">www.wealthwise.ch · Basierend auf BSV/BFS-Kennzahlen 2026 · Kostenlos · Keine Registrierung</text>
</svg>
